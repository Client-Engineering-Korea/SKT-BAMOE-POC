server.address=0.0.0.0
server.port=8080
server.servlet.context-path=/

########
# CORS #
########

# Configure allowed CORS origin patterns. This is required for BAMOE Management Console to interact with the Business Service.
# You can specify multiple origins separated by commas, or use patterns with wildcards.
# Examples:
#   - Single origin: bamoe.cors.allowed-origin-patterns=https://example.com
#   - Multiple origins: bamoe.cors.allowed-origin-patterns=https://example.com,https://another.com
#   - Pattern with wildcard: bamoe.cors.allowed-origin-patterns=https://*.example.com
#   - All origins (default, not recommended for production): bamoe.cors.allowed-origin-patterns=*
#
# This property can also be set via the BAMOE_CORS_ALLOWED_ORIGIN_PATTERNS environment variable.
# CAUTION: The default value (*) allows all origins. Change it to allow only the desired origins before deploying to production.
bamoe.cors.allowed-origin-patterns=*

# FACT DATA (fact-server profile 활성 시 Excel 인메모리 로드)
fact.excelFilename=excel_data/fact_data.xlsx

# FACT API base URL (rule-server / 통합 테스트에서 BPMN ServiceTask 가 호출)
# - default 값은 self (8080) — 통합 테스트 등 단일 인스턴스 환경
# - rule-server profile 에서 8081 로 override (application-rule-server.properties)
fact.api.base-url=http://localhost:${server.port}
