# Fact API 전용 인스턴스 (port 8081)
#
# 기동:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev,fact-server
#
# 활성:  FactDataController, FactDataService, FactDataService(@PostConstruct Excel 로딩)
# 비활성: RuleCheckController, RuleCheckService, FactPrefetchService, RestTemplate, BPMN runtime
#
# 외부에서 호출:
#   GET http://localhost:8081/api/fact/cust/getCustService/{svcMgmtNum}
#   GET http://localhost:8081/api/fact/eqp/getEquipmentModel/{eqpMdlCd}
server.port=8081
