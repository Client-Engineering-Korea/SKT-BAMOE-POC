# 룰 엔진 전용 인스턴스 (port 8080)
#
# 기동 (사전 조건: fact-server 인스턴스가 port 8081 에 떠있어야 함):
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev,rule-server
#
# 활성:  RuleCheckController, RuleCheckService, FactPrefetchService(HTTP), RestTemplate, BPMN runtime
# 비활성: FactDataController, FactDataService, FactDataService(@PostConstruct)
#
# BPMN ServiceTask 가 fact API 호출 시 사용하는 base URL.
# 별도 fact-server 인스턴스(port 8081) 에 HTTP GET.
server.port=8080
fact.api.base-url=http://localhost:8081
