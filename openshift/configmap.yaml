apiVersion: v1
kind: ConfigMap
metadata:
  name: skt-bamoe-business-service-config
  labels:
    app.kubernetes.io/name: skt-bamoe-business-service
    app.kubernetes.io/instance: skt-bamoe-business-service
    app.kubernetes.io/component: backend
    app.kubernetes.io/part-of: skt-bamoe-poc
data:
  SERVER_PORT: "8081"
  SPRING_PROFILES_ACTIVE: "prod"
  BAMOE_CORS_ALLOWED_ORIGIN_PATTERNS: "*"
  MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: "health,info,prometheus"
  MANAGEMENT_ENDPOINT_HEALTH_PROBES_ENABLED: "true"
  MANAGEMENT_HEALTH_LIVENESSSTATE_ENABLED: "true"
  MANAGEMENT_HEALTH_READINESSSTATE_ENABLED: "true"
  MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: "never"
  SERVER_SHUTDOWN: "graceful"

